<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改记录 - 课堂手机管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: white; font-size: 20px; }
        .header .nav-links a { color: white; text-decoration: none; margin-left: 20px; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .header .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h2 { color: #333; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #667eea; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #555; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-secondary { background: #e9ecef; color: #666; }
        .btn-secondary:hover { background: #dee2e6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>课堂手机管理系统</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/teacher/schedule">我的课堂</a>
            <a href="/teacher/recordList">记录管理</a>
            <a href="/stat">统计报表</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>  修改没收记录</h2>

            <form th:action="@{/teacher/updateRecord}" method="post">
                <input type="hidden" name="id" th:value="${record.id}">

                <div class="form-group">
                    <label>没收数量</label>
                    <input type="number" name="confiscateCount" th:value="${record.confiscateCount}" min="1" max="50" required>
                </div>

                <div class="form-group">
                    <label>柜子位置</label>
                    <input type="text" name="cabinetLocation" th:value="${record.cabinetLocation}" placeholder="如：A栋101柜">
                </div>

                <div class="form-group">
                    <label>移交状态</label>
                    <select name="handoverStatus">
                        <option value="0" th:selected="${record.handoverStatus == 0}">未移交</option>
                        <option value="1" th:selected="${record.handoverStatus == 1}">已移交</option>
                    </select>
                </div>

                <div class="btn-group">
                    <a href="/teacher/recordList" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
