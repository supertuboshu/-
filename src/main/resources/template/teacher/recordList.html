<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录管理 - 课堂手机管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: white; font-size: 20px; }
        .header .nav-links a { color: white; text-decoration: none; margin-left: 20px; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .header .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 { color: #333; font-size: 24px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 14px; text-align: left; }
        td { padding: 14px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }

        .btn {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }

        .empty-msg { text-align: center; color: #999; padding: 40px; }

        .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>课堂手机管理系统</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/teacher/schedule">我的课堂</a>
            <a href="/teacher/recordList">记录管理</a>
            <a href="/stat">统计报表</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>  手机代管记录</h2>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>周次</th>
                        <th>节次</th>
                        <th>没收数量</th>
                        <th>柜子位置</th>
                        <th>登记时间</th>
                        <th>移交状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${recordList}">
                        <td th:text="${r.id}"></td>
                        <td th:text="'第' + ${r.weekNum} + '周'"></td>
                        <td>
                            <span th:if="${r.sectionNum == 1}">上午</span>
                            <span th:if="${r.sectionNum == 2}">下午</span>
                            <span th:if="${r.sectionNum == 3}">晚上</span>
                        </td>
                        <td><strong th:text="${r.confiscateCount}"></strong> 部</td>
                        <td th:text="${r.cabinetLocation}"></td>
                        <td th:text="${#temporals.format(r.confiscateTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <span th:if="${r.handoverStatus == 0}" class="status-badge status-pending">未移交</span>
                            <span th:if="${r.handoverStatus == 1}" class="status-badge status-done">已移交</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/teacher/toEdit(id=${r.id})}" class="btn btn-primary">修改</a>
                                <form th:action="@{/teacher/deleteRecord}" method="post" style="display:inline;" onsubmit="return confirm('确定删除该记录？')">
                                    <input type="hidden" name="id" th:value="${r.id}">
                                    <button type="submit" class="btn btn-danger">删除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(recordList)}" class="empty-msg">
                暂无没收记录
            </div>
        </div>
    </div>
</body>
</html>
