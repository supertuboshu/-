<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂手机管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }

        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: white; font-size: 24px; }
        .header .nav-links a { color: white; text-decoration: none; margin-left: 20px; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .header .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .welcome {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .welcome h2 { font-size: 36px; margin-bottom: 10px; }
        .welcome p { font-size: 18px; opacity: 0.9; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .card-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .card-icon.blue { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .card-icon.green { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .card-icon.orange { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .card-icon.purple { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }

        .card h3 { font-size: 20px; color: #333; margin-bottom: 10px; }
        .card p { color: #666; font-size: 14px; line-height: 1.6; }

        .stats-bar {
            background: white;
            border-radius: 16px;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>课堂手机管理系统</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/teacher/schedule">我的课堂</a>
            <a href="/teacher/recordList">记录管理</a>
            <a href="/stat">统计报表</a>
        </div>
    </div>

    <div class="container">
        <div class="welcome">
            <h2>欢迎使用课堂手机管理系统</h2>
            <p>规范课堂秩序，提升教学质量</p>
        </div>

        <div class="cards">
            <a href="/teacher/schedule" class="card">
                <div class="card-icon blue"> </div>
                <h3>我的课堂</h3>
                <p>查看近两日授课安排，快速登记没收手机记录</p>
            </a>

            <a href="/teacher/recordList" class="card">
                <div class="card-icon green"> </div>
                <h3>记录管理</h3>
                <p>查看、修改、删除手机没收记录</p>
            </a>

            <a href="/stat" class="card">
                <div class="card-icon orange"> </div>
                <h3>统计报表</h3>
                <p>多维度数据统计，直观了解手机使用情况</p>
            </a>

            <a href="/teacher/toAdd?scheduleId=1&weekNum=16&sectionNum=1" class="card">
                <div class="card-icon purple"> </div>
                <h3>快速登记</h3>
                <p>直接进入手机没收登记页面</p>
            </a>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value">5</div>
                <div class="stat-label">管理班级</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">5</div>
                <div class="stat-label">授课教师</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">6</div>
                <div class="stat-label">教室数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">4</div>
                <div class="stat-label">没收记录</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>课堂手机管理系统 v1.0 | 课堂秩序管理平台</p>
    </div>
</body>
</html>
